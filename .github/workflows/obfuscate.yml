name: Obfuscate and Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - '**'

jobs:
  build-and-obfuscate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Skip if auto-commit
        run: |
          if git log -1 --pretty=%B | grep -q '^部署用这个$'; then
            echo "Auto-commit detected, skipping."
            exit 78
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Obfuscator
        run: npm install javascript-obfuscator

      - name: Obfuscate source.js -> worker.js
        env:
          NODE_OPTIONS: --max-old-space-size=4096
        run: |
          node -e "
          const JavaScriptObfuscator = require('javascript-obfuscator');
          const fs = require('fs');

          const code = fs.readFileSync('source.js', 'utf8');
          const result = JavaScriptObfuscator.obfuscate(code, {
            compact: true,
            controlFlowFlattening: false,
            deadCodeInjection: false,
            stringArray: true,
            stringArrayEncoding: ['base64'],
            stringArrayThreshold: 1.0,
            stringArrayRotate: true,
            stringArrayShuffle: true,
            stringArrayWrappersCount: 2,
            stringArrayWrappersChainedCalls: false,
            renameGlobals: true,
            identifierNamesGenerator: 'mangled-shuffled',
            renameProperties: false,
            ignoreImports: false,
            target: 'browser',
            numbersToExpressions: false,
            simplify: false,
            splitStrings: true,
            splitStringsChunkLength: 3,
            transformObjectKeys: false,
            unicodeEscapeSequence: false,
            selfDefending: false,
            debugProtection: false,
            disableConsoleOutput: true
          });
          fs.writeFileSync('worker.js', result.getObfuscatedCode(), 'utf8');
          console.log('Obfuscation complete: source.js -> worker.js');
          "

      - name: Copy worker.js to _worker.js
        run: cp worker.js _worker.js

      - name: Commit and push
        run: |
          git config --global user.name 'GitHub Actions Bot'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add worker.js _worker.js wrangler.toml
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "部署用这个"
            git push
          fi
